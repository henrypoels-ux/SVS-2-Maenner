<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mannschaftskasse · 2. Herren Straelen</title>
<style>
  :root{
    --gruen:#006B3F;        /* Dunkelgrün */
    --gruen-hell:#2E8B57;   /* Vereinsgrün */
    --gelb:#FFD100;         /* Vereinsgelb */
    --bg:#F2F2F7;           /* iOS Hintergrund */
    --card:#FFFFFF;
    --text:#1C1C1E;
    --grau:#8E8E93;
    --grau-hell:#C7C7CC;
    --rot:#FF3B30;
    --gruen-ios:#34C759;
    --trenner:rgba(60,60,67,.12);
    --radius:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow-x:hidden;max-width:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  body.noscroll{overflow:hidden;position:fixed;width:100%;}
  #app{max-width:480px;margin:0 auto;min-height:100%;position:relative;background:var(--bg);overflow-x:hidden;}

  /* ---------- Header ---------- */
  header{
    background:var(--gruen);color:#fff;
    padding:calc(var(--safe-top) + 12px) 18px 14px;
    position:sticky;top:0;z-index:50;
    box-shadow:0 1px 0 rgba(0,0,0,.06);
  }
  .h-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .h-club{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;opacity:.92;letter-spacing:.2px;}
  .h-logo{width:30px;height:30px;border-radius:7px;background:transparent;color:var(--gelb);overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
  .h-logo img{width:100%;height:100%;object-fit:contain;display:block;}
  .h-title{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-top:8px;}
  .h-sub{font-size:13px;opacity:.85;margin-top:2px;}

  /* Rollen-Schalter */
  .roleswitch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);
    border-radius:10px;padding:3px;}
  .roleswitch button{border:0;background:transparent;color:#fff;font-size:11.5px;font-weight:600;
    padding:6px 9px;border-radius:8px;cursor:pointer;opacity:.8;}
  .roleswitch button.active{background:#fff;color:var(--gruen);opacity:1;}

  /* ---------- Inhalt ---------- */
  main{padding:16px 16px 96px;}
  .sec-title{font-size:13px;font-weight:600;color:var(--grau);text-transform:uppercase;
    letter-spacing:.4px;margin:18px 4px 8px;}
  .sec-title:first-child{margin-top:4px;}

  .lock{display:inline-flex;align-items:center;gap:5px;background:var(--gelb);color:#7a5b00;
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;}

  /* Karten */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;}
  .card + .card{margin-top:12px;}

  /* Kennzahl-Kacheln */
  .kpi{background:linear-gradient(135deg,var(--gruen),var(--gruen-hell));color:#fff;
    border-radius:18px;padding:18px 20px;box-shadow:0 6px 18px rgba(0,107,63,.25);}
  .kpi .lbl{font-size:13px;opacity:.9;font-weight:600;}
  .kpi .val{font-size:36px;font-weight:800;letter-spacing:-1px;margin-top:2px;}
  .kpi .val small{font-size:20px;font-weight:700;}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .tile{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .tile .t-lbl{font-size:12px;color:var(--grau);font-weight:600;}
  .tile .t-val{font-size:22px;font-weight:800;margin-top:4px;letter-spacing:-.5px;}
  .tile .t-sub{font-size:11px;color:var(--grau);margin-top:2px;}

  /* Listen (iOS) */
  .list{list-style:none;margin:0;padding:0;}
  .row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--trenner);
    cursor:default;}
  .row:last-child{border-bottom:0;}
  .row.tap{cursor:pointer;}
  .row.tap:active{background:#f5f5f7;}
  .ava{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;font-weight:700;font-size:14px;color:#fff;background:var(--gruen-hell);}
  .r-main{flex:1;min-width:0;}
  .r-title{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .r-sub{font-size:13px;color:var(--grau);margin-top:1px;}
  .r-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .amount{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
  .pos{color:var(--gruen-ios);}.neg{color:var(--rot);}
  .chev{color:var(--grau-hell);font-size:19px;margin-left:2px;}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .pill.paid{background:rgba(52,199,89,.15);color:#1f8a3b;}
  .pill.open{background:rgba(255,59,48,.12);color:#c8261c;}
  .pill.bar{background:rgba(255,209,0,.25);color:#7a5b00;}
  .pill.pp{background:rgba(0,107,63,.12);color:var(--gruen);}
  .pill.ueb{background:rgba(46,139,87,.15);color:#1f6b41;}
  .pill.grey{background:#EFEFF4;color:var(--grau);}

  /* Segmented control */
  .seg{display:flex;background:#E4E4EA;border-radius:10px;padding:3px;margin:0 0 14px;}
  .seg button{flex:1;border:0;background:transparent;font-size:13px;font-weight:600;color:var(--text);
    padding:8px 4px;border-radius:8px;cursor:pointer;}
  .seg button.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12);}

  /* Buttons */
  .addbtn{position:fixed;right:calc(50% - 240px + 18px);bottom:calc(78px + var(--safe-bottom));
    z-index:60;background:var(--gruen);color:#fff;border:0;width:56px;height:56px;border-radius:50%;
    font-size:30px;line-height:1;box-shadow:0 6px 16px rgba(0,107,63,.4);cursor:pointer;}
  @media(max-width:480px){.addbtn{right:18px;}}
  .btn{display:block;width:100%;border:0;background:var(--gruen);color:#fff;font-size:16px;
    font-weight:700;padding:15px;border-radius:13px;cursor:pointer;margin-top:6px;}
  .btn.sec{background:#EFEFF4;color:var(--text);}

  /* Bottom Tab Bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:55;display:flex;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--trenner);padding-bottom:var(--safe-bottom);
    max-width:480px;margin:0 auto;}
  .tabbar button{flex:1;border:0;background:transparent;padding:8px 0 7px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--grau);}
  .tabbar button.active{color:var(--gruen);}
  .tabbar svg{width:25px;height:25px;}
  .tabbar span{font-size:10.5px;font-weight:600;}

  /* Bottom Sheet (Modal) */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;
    transition:opacity .25s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--bg);
    border-radius:20px 20px 0 0;max-width:480px;margin:0 auto;transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto;overflow-x:hidden;
    touch-action:pan-y;padding:8px 18px calc(24px + var(--safe-bottom));}
  .tile.tap{cursor:pointer;}
  .tile.tap:active{background:#f5f5f7;}
  .sheet.show{transform:translateY(0);}
  .grip-zone{display:flex;justify-content:center;align-items:center;height:30px;cursor:grab;touch-action:none;margin-bottom:6px;}
  .grip-zone:active{cursor:grabbing;}
  .grip-bar{width:42px;height:5px;background:var(--grau-hell);border-radius:3px;}
  .sheet h3{font-size:20px;font-weight:800;margin:0 0 14px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--grau);margin:0 2px 6px;}
  .field input,.field select{width:100%;border:1px solid var(--grau-hell);background:#fff;
    border-radius:11px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--text);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gruen-hell);}

  /* Monatsbeitrag-Checkliste */
  .months{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
  .mchip{border:1.5px solid var(--grau-hell);background:#fff;border-radius:11px;padding:11px 6px;
    text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--grau);}
  .mchip.on{background:var(--gruen);border-color:var(--gruen);color:#fff;}
  .mchip small{display:block;font-size:10px;font-weight:600;opacity:.7;margin-top:2px;}
  .mchip.on small{opacity:.85;}

  .empty{text-align:center;color:var(--grau);font-size:14px;padding:40px 20px;}
  .note{font-size:12px;color:var(--grau);margin:8px 4px 0;line-height:1.4;}
  .badge-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
  .s-aktiv{background:rgba(52,199,89,.15);color:#1f8a3b;}
  .s-inaktiv{background:#EFEFF4;color:var(--grau);}
  .s-gast{background:rgba(255,209,0,.25);color:#7a5b00;}
  .s-coach{background:rgba(0,107,63,.12);color:var(--gruen);}

  /* Zahnrad */
  .gear{border:0;background:rgba(255,255,255,.16);color:#fff;width:38px;height:38px;border-radius:11px;
    font-size:19px;cursor:pointer;line-height:1;}
  .gear:active{background:rgba(255,255,255,.3);}
  /* Rollen-Hinweis */
  .rolebanner{font-size:12.5px;font-weight:600;padding:8px 16px;text-align:center;}
  .rolebanner.kw{background:rgba(52,199,89,.2);color:#1c7a35;}
  .rolebanner.sw{background:rgba(255,209,0,.32);color:#7a5b00;}
  /* Monats-Navigation */
  .mnav{display:flex;align-items:center;justify-content:space-between;background:var(--card);
    border-radius:12px;padding:6px 8px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .mnav button{border:0;background:#EFEFF4;color:var(--gruen);width:40px;height:38px;border-radius:9px;
    font-size:22px;cursor:pointer;line-height:1;font-weight:700;}
  .mnav button:active{background:var(--grau-hell);}
  .mnav-lbl{font-size:17px;font-weight:800;}
  /* Einnahme-Eingabe je Spieler */
  .ein-in{width:92px;text-align:right;border:1px solid var(--grau-hell);border-radius:9px;
    padding:9px 10px;font-size:15px;font-family:inherit;font-variant-numeric:tabular-nums;}
  .ein-in:focus{outline:none;border-color:var(--gruen-hell);}
  /* iOS Swipe-to-delete */
  .swipe-wrap{position:relative;overflow:hidden;}
  .swipe-del{position:absolute;top:0;right:0;height:100%;width:80px;background:var(--rot);color:#fff;
    border:0;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .swipe-content{position:relative;background:var(--card);will-change:transform;touch-action:pan-y;}
  /* Login-Screen */
  #login{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,var(--gruen),var(--gruen-hell));
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:#fff;border-radius:22px;padding:30px 24px;width:100%;max-width:360px;
    box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center;}
  .login-logo{width:74px;height:74px;margin:0 auto 12px;}
  .login-logo img{width:100%;height:100%;object-fit:contain;}
  .login-card h2{font-size:20px;font-weight:800;color:var(--gruen);margin:0 0 18px;line-height:1.25;}
  .login-card input{width:100%;border:1px solid var(--grau-hell);border-radius:11px;padding:13px 14px;
    font-size:16px;margin-bottom:10px;font-family:inherit;}
  .login-card input:focus{outline:none;border-color:var(--gruen-hell);}
  .login-card button{width:100%;border:0;background:var(--gruen);color:#fff;font-size:16px;font-weight:700;
    padding:14px;border-radius:12px;cursor:pointer;margin-top:4px;}
  .login-err{color:var(--rot);font-size:13px;font-weight:600;margin-top:10px;min-height:16px;}
  .login-info{color:var(--grau);font-size:12px;margin-top:10px;line-height:1.5;}
  .testbanner{background:#FFF4CC;color:#7a5b00;font-size:11.5px;font-weight:600;padding:7px 16px;text-align:center;}
  /* Long-Press-Tooltip */
  #tooltip{position:fixed;z-index:300;display:none;max-width:240px;background:#1c1c1e;color:#fff;
    font-size:12.5px;line-height:1.4;padding:9px 12px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.35);
    pointer-events:none;}
  [data-info]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
</style>
</head>

/* Voller Saldo je Spieler: fällige Beiträge + Strafen − Gutschriften − Einzahlungen
   (alles bis zum Stichtag HEUTE).  >0 = schuldet (offen), <0 = Guthaben */
function playerSaldo(id){
  const p=player(id); if(!p) return 0;
  return beitragFaellig(p) + strafenNetBis(id, HEUTE) - einzahlungBis(id, HEUTE);
}

function monatlich(p){ // monatlicher Beitrag je nach Beitragsart
  if(p.status!=='aktiv') return 0;
  let s=0;
  if(p.art!=='mannschaft') s+=MB;   // Monatsbeitrag (außer "nur Mannschaft")
  if(p.art!=='monat')      s+=MMB;  // Mannschaftsbeitrag (außer "nur Monat")
  return s;
}
function beitrag(p){ // Beitrag GANZE Saison (Soll) = aktive Monate × monatlicher Beitrag
  if(p.status!=='aktiv') return 0;
  return Object.values(p.months).filter(Boolean).length * monatlich(p);
}
function beitragFaellig(p){ // bereits fälliger Beitrag bis zum aktuellen Monat
  if(p.status!=='aktiv') return 0;
  return SAISON.filter(([k])=>p.months[k]&&k<=HEUTE).length * monatlich(p);
}
function beitragSollGesamt(){return state.players.filter(p=>p.status==='aktiv').reduce((s,p)=>s+beitrag(p),0);}
function artLabel(a){return {beides:'Monats- + Mannschaftsbeitrag',monat:'nur Monatsbeitrag',mannschaft:'nur Mannschaftsbeitrag'}[a]||'—';}
function thekeSaldo(){return state.theke.reduce((s,t)=>s+(t.typ==='ausgleich'?-t.betrag:t.betrag),0);}

/* Helfer für die Monatsabrechnung (Spalten je Spieler) */
function monatsAnteil(p){return (p.status==='aktiv'&&p.art!=='mannschaft')?MB:0;}   // Monatsbeitrag-Spalte
function mfAnteil(p){return (p.status==='aktiv'&&p.art!=='monat')?MMB:0;}            // MF-Beitrag-Spalte
function einzahlungMonat(pid,m){
  let s=0;
  state.einnahmen.filter(e=>e.playerId===pid&&e.monat===m).forEach(e=>s+=(e.bank||0)+(e.paypal||0));
  state.bareinnahmen.filter(e=>e.playerId===pid&&e.datum.slice(0,7)===m).forEach(e=>s+=e.betrag);
  return s;
}
function einzahlungBis(pid,m){
  let s=0;
  state.einnahmen.filter(e=>e.playerId===pid&&e.monat<=m).forEach(e=>s+=(e.bank||0)+(e.paypal||0));
  state.bareinnahmen.filter(e=>e.playerId===pid&&e.datum.slice(0,7)<=m).forEach(e=>s+=e.betrag);
  return s;
}
function strafenNetMonat(pid,m){return state.strafen.filter(s=>s.playerId===pid&&s.datum.slice(0,7)===m).reduce((a,x)=>a+(x.typ==='gutschrift'?-x.betrag:x.betrag),0);}
function strafenNetBis(pid,m){return state.strafen.filter(s=>s.playerId===pid&&s.datum.slice(0,7)<=m).reduce((a,x)=>a+(x.typ==='gutschrift'?-x.betrag:x.betrag),0);}
function beitragBis(p,m){return p.status!=='aktiv'?0:SAISON.filter(([k])=>p.months[k]&&k<=m).length*monatlich(p);}
function monatKurz(m){const [y,mm]=m.split('-');return MONATE[+mm-1].slice(0,3)+' '+y.slice(2);}

function paypalSaldo(){
  return state.einnahmen.reduce((s,e)=>s+(e.paypal||0),0)
    + state.sonstige.filter(x=>x.quelle==='paypal').reduce((s,x)=>s+x.betrag,0)
    - state.transfers.reduce((s,t)=>s+t.betrag,0);
}

/* Kassen-Salden */
function salden(){
  const barIn  = state.bareinnahmen.reduce((s,e)=>s+e.betrag,0);
  const barOut = state.ausgaben.filter(a=>a.quelle==='bar').reduce((s,a)=>s+a.betrag,0);
  const bankIn = state.einnahmen.reduce((s,e)=>s+(e.bank||0),0)
    + state.sonstige.filter(x=>x.quelle==='bank').reduce((s,x)=>s+x.betrag,0)
    + state.transfers.reduce((s,t)=>s+t.betrag,0);
  const bankOut= state.ausgaben.filter(a=>a.quelle==='bank').reduce((s,a)=>s+a.betrag,0); // quelle 'spieler' (Schiri vom Spieler) belastet die Kasse nicht
  const bar = barIn-barOut, bank = bankIn-bankOut, paypal = paypalSaldo();
  const thekeOffen = thekeSaldo();   // Summe Käufe − Ausgleiche
  // Offene Spielersalden = Summe aller positiven Salden (was Spieler der Kasse schulden)
  const offeneSalden = state.players.filter(p=>p.status==='aktiv').reduce((s,p)=>s+Math.max(0,playerSaldo(p.id)),0);
  return {bar,bank,paypal,gesamt:bar+bank+paypal,thekeOffen,offeneSalden};
}

/* iOS-typisches Wischen nach links zum Löschen */
let swipeEl=null, swipeStart=0, swipeDx=0, swipeOpen=false;
function initSwipe(){
  document.querySelectorAll('.swipe-content').forEach(c=>{
    c.addEventListener('touchstart',e=>swDown(c,e.touches[0].clientX),{passive:true});
    c.addEventListener('touchmove', e=>swMove(e.touches[0].clientX),{passive:true});
    c.addEventListener('touchend', swUp);
    c.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse')swDown(c,e.clientX);});
  });
}
function swDown(c,x){swipeEl=c;swipeStart=x;swipeOpen=c.dataset.open==='1';c.style.transition='none';}
function swMove(x){if(!swipeEl)return;swipeDx=Math.max(-90,Math.min(0,x-swipeStart+(swipeOpen?-80:0)));swipeEl.style.transform=`translateX(${swipeDx}px)`;}
function swUp(){if(!swipeEl)return;const c=swipeEl;swipeEl=null;c.style.transition='transform .2s';
  if(swipeDx<-40){c.style.transform='translateX(-80px)';c.dataset.open='1';}else{c.style.transform='translateX(0)';c.dataset.open='0';}swipeDx=0;}
window.addEventListener('pointermove',e=>{if(swipeEl&&e.pointerType==='mouse')swMove(e.clientX);});
window.addEventListener('pointerup',  e=>{if(swipeEl&&e.pointerType==='mouse')swUp();});

/* Long-Press → Info-Tooltip (wann & von wem) */
function initInfo(){
  document.querySelectorAll('[data-info]').forEach(el=>{
    let t=null, sx=0, sy=0;
    const cancel=()=>{ if(t){clearTimeout(t);t=null;} };
    const start=(x,y)=>{ sx=x;sy=y;cancel(); t=setTimeout(()=>{ t=null; showTooltip(el.getAttribute('data-info'),x,y); }, 450); };
    const moved=(x,y)=>{ if(Math.abs(x-sx)>10||Math.abs(y-sy)>10) cancel(); };
    el.addEventListener('touchstart',e=>start(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
    el.addEventListener('touchmove', e=>moved(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
    el.addEventListener('touchend', cancel);
    el.addEventListener('mousedown', e=>{ if(e.button===0) start(e.clientX,e.clientY); });
    el.addEventListener('mousemove', e=>moved(e.clientX,e.clientY));
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
    el.addEventListener('contextmenu', e=>e.preventDefault());
  });
}

/* Verlauf/Historie eines Spielers (eigene oder – als Kassenwart – alle) */
function openHistorie(pid){
  const p=player(pid); if(!p) return;
  const sal=playerSaldo(pid);
  const mv=[];
  if(p.status==='aktiv') SAISON.forEach(([k])=>{ if(p.months[k]&&k<=HEUTE) mv.push({d:k+'-01',t:'Beitrag '+monthLabel(k),b:monatlich(p)}); });
  state.strafen.filter(s=>s.playerId===pid).forEach(s=>mv.push({d:s.datum,t:(s.typ==='gutschrift'?'Gutschrift: ':'Strafe: ')+s.grund,b:s.typ==='gutschrift'?-s.betrag:s.betrag}));
  state.einnahmen.filter(e=>e.playerId===pid).forEach(e=>{
    if(e.bank)   mv.push({d:e.monat+'-01',t:'Einzahlung Bank ('+monthLabel(e.monat)+')',b:-e.bank});
    if(e.paypal) mv.push({d:e.monat+'-01',t:'Einzahlung PayPal ('+monthLabel(e.monat)+')',b:-e.paypal});
  });
  state.bareinnahmen.filter(e=>e.playerId===pid).forEach(e=>mv.push({d:e.datum,t:'Bar: '+(e.text||'Einzahlung'),b:-e.betrag}));
  mv.sort((a,b)=>b.d.localeCompare(a.d));
  const grad = sal>0?'linear-gradient(135deg,#e74c3c,#c0392b)':sal<0?'linear-gradient(135deg,var(--gruen-hell),var(--gruen))':'linear-gradient(135deg,#9aa0a6,#7c8085)';
  const rows = mv.length ? mv.map(m=>`<li class="row"><div class="r-main"><div class="r-title">${m.t}</div><div class="r-sub">${dt(m.d)}</div></div>
    <div class="r-right"><div class="amount ${m.b<0?'pos':'neg'}">${m.b<0?'−':'+'}${eur(Math.abs(m.b))}</div></div></li>`).join('') : '<div class="empty">Noch keine Bewegungen</div>';
  showSheet(`<h3>${p.name}</h3>
    <div class="kpi" style="background:${grad}"><div class="lbl">${sal>0?'Offen':sal<0?'Guthaben':'Saldo'}</div><div class="val">${eur(Math.abs(sal))}</div></div>
    <div class="sec-title">Verlauf</div>
    <div class="card"><ul class="list">${rows}</ul></div>
    <p class="note">Rot = Soll (fällige Beiträge + Strafen). Grün = Einzahlungen + Gutschriften. Saldo oben = Differenz.</p>
    <button class="btn sec" style="margin-top:14px" onclick="closeSheet()">Schließen</button>`);
}

function statusLabel(s){return {aktiv:'Aktiv',inaktiv:'Inaktiv',gast:'Gast',coach:'Coach'}[s];}

function row(title,sub,amount,cls,extra=''){
  return `<li class="row"><div class="ava">${initials(title)}</div>
    <div class="r-main"><div class="r-title">${title}</div><div class="r-sub">${sub}</div></div>

function viewStrafen(){
  const can = canEdit('strafen');
  const head = (!can&&role==='spieler') ? `<div style="margin-bottom:12px"><span class="lock">🔒 Nur Lesezugriff</span></div>` : '';
  const filterBtns = currentUser ? `<div class="seg" style="margin-bottom:14px">
    <button class="${strafenFilter==='alle'?'active':''}" onclick="setStrafenFilter('alle')">Alle</button>
    <button class="${strafenFilter==='meine'?'active':''}" onclick="setStrafenFilter('meine')">Nur meine</button></div>` : '';
  let items = state.strafen;
  if(strafenFilter==='meine' && currentUser) items = items.filter(s=>s.playerId===currentUser.id);
  const groups = byMonth(items);
  if(!groups.length) return head+filterBtns+`<div class="empty">Keine Einträge</div>`;
  const body = groups.map(g=>{
    const sum = g.items.reduce((a,x)=>a+(x.typ==='gutschrift'?-x.betrag:x.betrag),0);
    const rows = g.items.sort((a,b)=>b.datum.localeCompare(a.datum)).map(s=>{
      const p=player(s.playerId); const gut=s.typ==='gutschrift';
      const avaStyle=gut?'background:var(--gruen-ios)':'';
      const info='Eingetragen '+(s.createdAt?new Date(s.createdAt).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—')+' von '+(s.erfasstVon||'unbekannt');
      const sub=`${s.grund} · ${dt(s.datum)}${s.anmerkung?`<br><span style="opacity:.85">(${s.anmerkung})</span>`:''}`;
      const right=`<div class="amount ${gut?'pos':''}">${gut?'+':''}${eur(s.betrag).replace('-','')}</div>
        <span class="pill ${gut?'pp':'open'}">${gut?'Gutschrift':'Strafe'}</span>`;
      const inner=`<div class="row ${can?'tap':''}" data-info="${info}" ${can?`onclick="strafeTap(${s.id})"`:''}><div class="ava" style="${avaStyle}">${p?initials(p.name):'?'}</div>
        <div class="r-main"><div class="r-title">${p?p.name:'—'}</div><div class="r-sub">${sub}</div></div>
        <div class="r-right">${right}</div></div>`;
      if(can) return swipeRow(inner,`deleteStrafe(${s.id})`);
      return `<li class="row" data-info="${info}"><div class="ava" style="${avaStyle}">${p?initials(p.name):'?'}</div>
        <div class="r-main"><div class="r-title">${p?p.name:'—'}</div><div class="r-sub">${sub}</div></div>
        <div class="r-right">${right}</div></li>`;
    }).join('');
    return monthSection(g.label, (sum<0?'+':'')+eur(Math.abs(sum)), rows, can);
  }).join('');
  return head+filterBtns+body+(can?'<p class="note">Plus-Button öffnet das Eingabefenster – oben zwischen <b>Strafe</b> und <b>Gutschrift</b> umschaltbar. Beides zählt automatisch zum Spieler-Saldo. Einen Eintrag nach links wischen zum Löschen.</p>':'');
}
function setStrafenFilter(f){ strafenFilter=f; render(); }
function openStrafeEdit(id){

async function saveStrafeEdit(id){
  const s=state.strafen.find(x=>x.id===id); if(!s) return;
  const grund=document.getElementById('se_g').value||s.grund;
  const betrag=+document.getElementById('se_b').value;

  try{ await dbUpdate('strafen',id,{grund,betrag,anmerkung}); s.grund=grund; s.betrag=betrag; s.anmerkung=anmerkung||undefined; closeSheet();render(); }catch(e){}

function viewKasse(){
  const subs = [['einnahmen','Einnahmen'],['ausgaben','Ausgaben'],['bar','Kassenbuch Bar'],['theke','Theke']];
  let body='';
  if(kasseSub==='einnahmen') body = listEinnahmen();

function listEinnahmen(){
  if(!canEdit('kasse')) return `<div style="margin-bottom:12px">${lockBadge()}</div>
    <p class="note">Einnahmen werden monatlich je Spieler erfasst – Eingabe nur für den Kassenwart.</p>`;
  const m = einnahmeMonat, feld = einnahmeKonto;
  const aktive = state.players.filter(p=>p.status==='aktiv'||p.status==='coach');
  const inakt  = state.players.filter(p=>p.status==='inaktiv'||p.status==='gast');
  const getE = pid => state.einnahmen.find(e=>e.playerId===pid&&e.monat===m);
  const cell = pid => {const e=getE(pid);const v=e&&e[feld]?e[feld]:'';
    return `<input type="number" inputmode="decimal" class="ein-in" value="${v}" placeholder="0,00"
      onchange="setEinnahme(${pid},'${feld}',this.value)">`;};
  const sum = aktive.reduce((s,p)=>{const e=getE(p.id);return s+(e?e[feld]||0:0);},0);
  const tableRows = aktive.map(p=>`<li class="row"><div class="ava">${initials(p.name)}</div>
      <div class="r-main"><div class="r-title">${p.name}</div>${p.status==='coach'?'<div class="r-sub">Coach</div>':''}</div>
      <div class="r-right" style="flex-direction:row;align-items:center;gap:6px">€&nbsp;${cell(p.id)}</div></li>`).join('');
  const inaktSum = inakt.reduce((s,p)=>{const e=getE(p.id);return s+(e?e[feld]||0:0);},0);
  const inaktBlock = inakt.length ? `
    <div class="sec-title" onclick="toggleInaktivEin()" style="display:flex;justify-content:space-between;cursor:pointer">
      <span>${einZeigeInaktiv?'▾':'▸'} Inaktive &amp; Gäste (${inakt.length})</span>
      <span style="text-transform:none;color:var(--text);font-weight:700">${eur(inaktSum)}</span></div>
    ${einZeigeInaktiv?`<div class="card"><ul class="list">${inakt.map(p=>`<li class="row"><div class="ava" style="background:var(--grau)">${initials(p.name)}</div>
      <div class="r-main"><div class="r-title">${p.name}</div><div class="r-sub">${statusLabel(p.status)}</div></div>
      <div class="r-right" style="flex-direction:row;align-items:center;gap:6px">€&nbsp;${cell(p.id)}</div></li>`).join('')}</ul></div>`:''}` : '';
  // Sonstige Einnahmen des gewählten Kontos (alle Monate)
  const sonst = state.sonstige.filter(x=>x.quelle===feld).sort((a,b)=>b.datum.localeCompare(a.datum));
  const sonstSum = sonst.reduce((a,x)=>a+x.betrag,0);
  const sonstRows = sonst.map(x=>swipeRow(
    `<div class="row"><div class="ava" style="background:var(--gruen-hell)">€</div>
      <div class="r-main"><div class="r-title">${x.text}</div><div class="r-sub">${dt(x.datum)}</div></div>
      <div class="r-right"><div class="amount pos">+${eur(x.betrag).replace('-','')}</div></div></div>`,
    `deleteSonstige(${x.id})`)).join('');
  const ppExtra = feld==='paypal' ? `
    ${transferBookings()}
    <div class="kpi" style="margin-top:16px;background:linear-gradient(135deg,var(--gruen-hell),var(--gruen))">
      <div class="lbl">PayPal-Saldo (alle Monate)</div><div class="val">${eur(paypalSaldo())}</div></div>
    <button class="btn" style="margin-top:12px" onclick="uebertragPaypal()">PayPal-Saldo an Bank übertragen</button>` : '';
  return `
  <div class="seg">
    <button class="${feld==='bank'?'active':''}" onclick="setEinKonto('bank')">🏦 Bank</button>
    <button class="${feld==='paypal'?'active':''}" onclick="setEinKonto('paypal')">📱 PayPal</button>
  </div>
  <div class="mnav">
    <button onclick="shiftMonat(-1)">‹</button>
    <div class="mnav-lbl">${monthLabel(m)}</div>
    <button onclick="shiftMonat(1)">›</button>
  </div>
  <button class="btn sec" style="margin-bottom:14px" onclick="addSonstige()">+ Sonstige Einnahme</button>
  <div class="sec-title" style="display:flex;justify-content:space-between"><span>${feld==='bank'?'🏦 Bank – je Spieler':'📱 PayPal – je Spieler'}</span><span style="text-transform:none;color:var(--text);font-weight:700">${eur(sum)}</span></div>
  <div class="card"><ul class="list">${tableRows}</ul></div>
  ${sonst.length?`<div class="sec-title" style="display:flex;justify-content:space-between"><span>Sonstige Einnahmen (${feld==='bank'?'Bank':'PayPal'})</span><span style="text-transform:none;color:var(--text);font-weight:700">+${eur(sonstSum).replace('-','')}</span></div><div class="card">${sonstRows}</div>`:''}
  ${ppExtra}
  ${inaktBlock}
  <p class="note">Oben Bank/PayPal umschalten, mit ‹ › den Monat wechseln. „Sonstige Einnahme" für Beträge ohne Spielerbezug (z. B. Übertrag Vorsaison, Erstattungen). Coaches stehen bei den aktiven Spielern; Inaktive &amp; Gäste sind unten eingeklappt.</p>`;
}
function toggleInaktivEin(){ einZeigeInaktiv=!einZeigeInaktiv; render(); }

function transferBookings(){
  if(!state.transfers.length) return '';
  const rows=[...state.transfers].sort((a,b)=>b.id-a.id).map(t=>swipeRow(
    `<div class="row"><div class="ava" style="background:var(--gruen-hell)">↦</div>
      <div class="r-main"><div class="r-title">Übertrag an Bank</div><div class="r-sub">${monthLabel(t.monat)}</div></div>
      <div class="r-right"><div class="amount neg">−${eur(t.betrag).replace('-','')}</div></div></div>`,
    `deleteTransfer(${t.id})`)).join('');
  return `<div class="sec-title">Überträge PayPal → Bank</div><div class="card">${rows}</div>`;
}
function swipeRow(inner, delCall){
  return `<div class="swipe-wrap"><button class="swipe-del" onclick="${delCall}">🗑️</button>
    <div class="swipe-content">${inner}</div></div>`;
}

function listAusgaben(){
  const can=canEdit('kasse');
  const head = !can?`<div style="margin-bottom:12px">${lockBadge()}</div>`:'';

    const sum = g.items.reduce((a,x)=>a+x.betrag,0);

      const pill = a.quelle==='bar'?['bar','Bar']:a.quelle==='spieler'?['pp','Spieler']:['ueb','Bank'];

        <div class="r-right">${right}</div></div>`;

function kassenbuchBar(){
  const can=canEdit('kasse');
  const moves=[];
  state.bareinnahmen.forEach(e=>moves.push({src:'in',id:e.id,datum:e.datum,text:e.text,betrag:e.betrag}));
  state.ausgaben.filter(a=>a.quelle==='bar').forEach(a=>moves.push({src:'out',id:a.id,datum:a.datum,text:a.kategorie,betrag:-a.betrag}));
  moves.sort((a,b)=>a.datum.localeCompare(b.datum));
  let saldo=0; moves.forEach(m=>{saldo+=m.betrag;m.saldo=saldo;});
  const groups = byMonth(moves);
  const body = groups.map(g=>{
    const sum = g.items.reduce((a,m)=>a+m.betrag,0);
    const rows = g.items.sort((a,b)=>b.datum.localeCompare(a.datum)).map(m=>{
      const inner=`<div class="row"><div class="r-main"><div class="r-title">${m.text}</div><div class="r-sub">${dt(m.datum)}</div></div>
        <div class="r-right"><div class="amount ${m.betrag<0?'neg':'pos'}">${m.betrag<0?'−':'+'}${eur(Math.abs(m.betrag)).replace('-','')}</div>
        <div class="r-sub">Saldo ${eur(m.saldo)}</div></div></div>`;
      if(can) return swipeRow(inner,`deleteKassenbuch('${m.src}',${m.id})`);
      return `<li class="row"><div class="r-main"><div class="r-title">${m.text}</div><div class="r-sub">${dt(m.datum)}</div></div>
        <div class="r-right"><div class="amount ${m.betrag<0?'neg':'pos'}">${m.betrag<0?'−':'+'}${eur(Math.abs(m.betrag)).replace('-','')}</div>
        <div class="r-sub">Saldo ${eur(m.saldo)}</div></div></li>`;}).join('');
    return monthSection(g.label,(sum<0?'−':'+')+eur(Math.abs(sum)).replace('-',''),rows,can);
  }).join('');
  return (body||`<div class="empty">Keine Bargeld-Bewegungen</div>`)+`<p class="note">Bargeld-Kassenbuch mit laufendem Saldo, monatlich unterteilt.${can?' Eintrag nach links wischen zum Löschen.':''}</p>`;
}

function listTheke(){
  const can=canEdit('kasse');     // Ausgleich + Ausgleich-Posten löschen (nur Kassenwart)

  const saldo=thekeSaldo();
  const groups = byMonth(state.theke);
  const body = groups.map(g=>{
    const sum = g.items.reduce((a,t)=>a+(t.typ==='ausgleich'?-t.betrag:t.betrag),0);
    const rows = g.items.sort((a,b)=>b.datum.localeCompare(a.datum)).map(t=>{
      const aus=t.typ==='ausgleich';
      const right=`<div class="amount ${aus?'pos':''}">${aus?'−':''}${eur(t.betrag).replace('-','')}</div>
        <span class="pill ${aus?'pp':'bar'}">${aus?'Ausgleich':'Kauf'}</span>`;
      const inner=`<div class="row"><div class="r-main"><div class="r-title">${t.artikel}</div>
        <div class="r-sub">${aus?'Ausgleich aus: ':'gekauft von: '}${t.wer} · ${dt(t.datum)}</div></div>
        <div class="r-right">${right}</div></div>`;
      const delOk = aus ? can : canK;
      return delOk ? swipeRow(inner,`deleteTheke(${t.id})`) : inner;
    }).join('');
    return monthSection(g.label,(sum<0?'−':'')+eur(Math.abs(sum)),rows,true);
  }).join('');
  return `${!canK?`<div style="margin-bottom:12px">${lockBadge()}</div>`:''}
  <div class="kpi" style="background:linear-gradient(135deg,#b8860b,var(--gelb));color:#5b4500">
    <div class="lbl">Offen an die Theke</div><div class="val">${eur(saldo)}</div></div>
  ${can?`<button class="btn" style="margin-top:12px" onclick="openThekeAusgleich()">Theke-Saldo ausgleichen</button>`:''}

  <p class="note">Theke-Käufe summieren sich zur offenen Schuld.${can?' Mit „Ausgleichen" wird eine Ausgabe (Geld an die Theke) gebucht und der Saldo reduziert.':''}${canK?' „+" fügt einen neuen Kauf hinzu.':''}</p>`;
}

function openThekeAusgleich(){
  const saldo=thekeSaldo();

      <option value="bank">Bank / Überweisung</option><option value="bar">Bargeldkasse</option></select></div>

    <button class="btn" onclick="saveThekeAusgleich()">Ausgleichen</button>
    <button class="btn sec" onclick="closeSheet()">Abbrechen</button>`);

async function saveThekeAusgleich(){
  const b=+document.getElementById('ta_b').value, q=document.getElementById('ta_q').value, d=document.getElementById('ta_d').value;
  if(b<=0){alert('Betrag muss größer 0 sein.');return;}
  try{
    const a=await dbInsert('ausgaben',{kategorie:'Ausgleich Theke',betrag:b,quelle:q,datum:d});
    state.ausgaben.push({id:a.id,kategorie:a.kategorie,betrag:Number(a.betrag),quelle:a.quelle,datum:a.datum});
    const t=await dbInsert('theke',{datum:d,typ:'ausgleich',artikel:'Ausgleich an Theke',wer:q==='bank'?'Bank':'Bargeld',betrag:b});
    state.theke.push({id:t.id,datum:t.datum,typ:'ausgleich',artikel:t.artikel,wer:t.wer,betrag:Number(t.betrag)});
    closeSheet();render();
  }catch(e){}
}
async function deleteTheke(id){if(!canEdit('kasse'))return;try{
  await sb.from('strafen').delete().eq('ref_theke',id);   // zugehörige Spieler-Strafe mit entfernen
  await dbDelete('theke',id);
  state.theke=state.theke.filter(t=>t.id!==id);
  state.strafen=state.strafen.filter(s=>s.refTheke!==id);

/* ---- Sheet-Mechanik ---- */
function showSheet(html){
  const sh=document.getElementById('sheet');
  sh.style.transform='';
  sh.innerHTML=`<div class="grip-zone" id="grip"><div class="grip-bar"></div></div>`+html;
  document.getElementById('overlay').classList.add('show');
  document.body.classList.add('noscroll');
  requestAnimationFrame(()=>sh.classList.add('show'));
  initSheetDrag();
}
function closeSheet(){
  const sh=document.getElementById('sheet');
  sh.classList.remove('show');
  sh.style.transform='';
  document.getElementById('overlay').classList.remove('show');
  document.body.classList.remove('noscroll');
}
/* Popup per Wischen nach unten schließen (am Griff oben) */
function initSheetDrag(){
  const sh=document.getElementById('sheet'), grip=document.getElementById('grip');
  if(!sh) return;
  let sy=0, dy=0, drag=false, top=false;
  const down=y=>{ drag=true; sy=y; dy=0; top=sh.scrollTop<=0; sh.style.transition='none'; };
  const move=y=>{ if(!drag)return; dy=y-sy; if(dy>0 && top) sh.style.transform=`translateY(${dy}px)`; };
  const up=()=>{ if(!drag)return; drag=false; sh.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
    if(dy>110 && top) closeSheet(); else sh.style.transform='translateY(0)'; dy=0; };
  sh.ontouchstart=e=>down(e.touches[0].clientY);
  sh.ontouchmove=e=>{ const y=e.touches[0].clientY; if(drag && top && (y-sy)>0) e.preventDefault(); move(y); };
  sh.ontouchend=up;
  if(grip){ grip.onpointerdown=e=>{ if(e.pointerType!=='mouse')return; down(e.clientY);
    const mm=ev=>move(ev.clientY), mu=()=>{ up(); window.removeEventListener('pointermove',mm); window.removeEventListener('pointerup',mu); };
    window.addEventListener('pointermove',mm); window.addEventListener('pointerup',mu); }; }
}

async function deleteSpieler(id){

    state.strafen=state.strafen.filter(s=>s.playerId!==id);

function openExport(){
  showSheet(`<h3>📄 PDF-Export</h3>
    <div class="field"><label>Bericht</label><select id="ex_typ">
      <option value="monat">Monatsabrechnung (alle Spieler mit Saldo)</option>

      <option value="schiri">Schiedsrichterabrechnungen</option></select></div>
    <div class="field"><label>Von Monat</label><input id="ex_von" type="month" value="2026-07"></div>
    <div class="field"><label>Bis Monat</label><input id="ex_bis" type="month" value="${HEUTE}"></div>
    <button class="btn" onclick="doExport()">Als PDF exportieren</button>
    <button class="btn sec" onclick="closeSheet()">Abbrechen</button>`);
}
function doExport(){
  const typ=document.getElementById('ex_typ').value;
  const von=document.getElementById('ex_von').value, bis=document.getElementById('ex_bis').value;
  const inRange=d=>{const k=d.slice(0,7);return k>=von&&k<=bis;};
  let title='', rows='';
  if(typ==='monat'){
    title='Monatsabrechnung';
    const M=bis;
    const m2=n=>n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
    const rowFn=(p,i)=>{
      const mb=monatsAnteil(p), mf=mfAnteil(p);
      const stMon=strafenNetMonat(p.id,M), einMon=einzahlungMonat(p.id,M);
      const summeBS=mb+mf+stMon;
      const offen=einzahlungBis(p.id,M)-(beitragBis(p,M)+strafenNetBis(p.id,M)); // >0 Guthaben, <0 schuldet
      const offCell = offen>0 ? `<b>${m2(offen)}</b> Guthaben` : offen<0 ? `<b class="owe">${m2(offen)}</b>` : `0,00 €`;
      return `<tr class="${i%2?'g':'b'}">
        <td class="name">${p.name}${p.status==='coach'?' (Coach)':''}</td>
        <td>${mb?m2(mb):''}</td>
        <td>${mf?m2(mf):''}</td>
        <td>${m2(stMon)}</td>
        <td>${einMon?m2(einMon):'– €'}</td>
        <td>${m2(summeBS)}</td>
        <td class="off">${offCell}</td></tr>`;
    };
    const haupt=state.players.filter(p=>p.status==='aktiv'||p.status==='coach').sort((a,b)=>a.name.localeCompare(b.name,'de'));
    const unten=state.players.filter(p=>p.status==='inaktiv'||p.status==='gast').sort((a,b)=>a.name.localeCompare(b.name,'de'));
    let body=haupt.map((p,i)=>rowFn(p,i)).join('');
    if(unten.length){
      body+=`<tr><td colspan="7" style="background:#dfe6df;font-weight:700">Inaktive Spieler &amp; Gäste</td></tr>`;
      body+=unten.map((p,i)=>rowFn(p,i)).join('');
    }
    rows=`<div class="matitle">SV Straelen · 2. Herren — Monatsabrechnung ${monatKurz(M)}</div>
      <div class="mwrap"><div class="msidebar">${monatKurz(M)}</div>
      <div style="flex:1;min-width:0"><div class="matop"></div>
      <table class="ma"><thead><tr>
        <th class="name">Name</th><th>Monats&shy;beitrag</th><th>MF-Beitrag</th>
        <th>Summe Gutschriften und Strafen</th><th>Einzahlungen</th>
        <th>Summe Beiträge und Strafen</th><th>Offener Betrag</th></tr></thead>
      <tbody>${body}</tbody></table></div></div>
      <div class="paybox"><b>Überweisung an den Kassenwart:</b>
        <table class="pb"><tr><td>Name:</td><td>${konto.inhaber}</td><td>PayPal:</td><td><u>${konto.paypal}</u></td></tr>
        <tr><td>IBAN:</td><td>${konto.iban}</td><td colspan="2"><span style="color:#c0392b"><u>Achtung:</u> Immer An „Freunde und Familie"</span></td></tr></table>
      </div>`;
  } else if(typ==='strafen'){
    title='Strafen & Gutschriften';
    const items=state.strafen.filter(s=>inRange(s.datum)).sort((a,b)=>a.datum.localeCompare(b.datum));
    rows=`<table><tr><th>Datum</th><th>Spieler</th><th>Grund</th><th>Art</th><th class="r">Betrag</th></tr>
      ${items.map(s=>`<tr><td>${s.datum}</td><td>${player(s.playerId)?player(s.playerId).name:'—'}</td><td>${s.grund}</td>
        <td>${s.typ==='gutschrift'?'Gutschrift':'Strafe'}</td><td class="r">${eur(s.betrag)}</td></tr>`).join('')}</table>`;
  } else if(typ==='schiri'){
    title='Schiedsrichterabrechnungen';
    const items=state.ausgaben.filter(a=>a.art==='schiri'&&inRange(a.datum)).sort((a,b)=>a.datum.localeCompare(b.datum));
    const sum=items.reduce((s,a)=>s+a.betrag,0);
    rows=`<table><tr><th>Datum</th><th class="r">Betrag</th><th>Bezahlt von</th></tr>
      ${items.map(a=>`<tr><td>${a.datum}</td><td class="r">${eur(a.betrag)}</td><td>${a.bezahltVon}</td></tr>`).join('')}
      <tr><td><b>Summe</b></td><td class="r"><b>${eur(sum)}</b></td><td></td></tr></table>`;
  } else if(typ==='spieler'){
    title='Spielerabrechnung';
    const aktive=state.players.filter(p=>p.status==='aktiv');
    rows=aktive.map((p,i)=>{
      const monate=SAISON.filter(([k])=>p.months[k]&&k>=von&&k<=bis).length;
      const beitragP=monate*monatlich(p);
      const strafen=state.strafen.filter(s=>s.playerId===p.id&&s.typ==='strafe'&&inRange(s.datum));
      const gut=state.strafen.filter(s=>s.playerId===p.id&&s.typ==='gutschrift'&&inRange(s.datum));
      const total=beitragP+strafen.reduce((a,b)=>a+b.betrag,0)-gut.reduce((a,b)=>a+b.betrag,0);
      return `<section style="${i>0?'page-break-before:always;':''}">
        <div class="head"><h1>SV Straelen · 2. Herren</h1><div class="meta">Spielerabrechnung<br>Zeitraum: ${von} – ${bis}</div></div>

          ${strafen.map(s=>`<tr><td>Strafe: ${s.grund} (${s.datum})</td><td class="r">${eur(s.betrag)}</td></tr>`).join('')}
          ${gut.map(s=>`<tr><td>Gutschrift: ${s.grund} (${s.datum})</td><td class="r">−${eur(s.betrag).replace('-','')}</td></tr>`).join('')}
          <tr class="sum"><td><b>Zu zahlen</b></td><td class="r"><b>${eur(total)}</b></td></tr>
        </table>
        <div class="pay"><b>Zahlungsmöglichkeiten</b><br>
          Überweisung: ${konto.inhaber} · IBAN ${konto.iban}${konto.bank?' · '+konto.bank:''}<br>
          PayPal: ${konto.paypal}<br>
          Verwendungszweck: „Beitrag ${p.name}"</div>
      </section>`;
    }).join('');
  } else {
    title='Übersicht'; const s=salden();
    rows=`<table>
      <tr><td>Kassenstand gesamt</td><td class="r"><b>${eur(s.gesamt)}</b></td></tr>
      <tr><td>Bargeld</td><td class="r">${eur(s.bar)}</td></tr>
      <tr><td>Bank</td><td class="r">${eur(s.bank)}</td></tr>
      <tr><td>PayPal-Saldo</td><td class="r">${eur(s.paypal)}</td></tr>

      <tr><td>Theke offen</td><td class="r">${eur(s.thekeOffen)}</td></tr>
      <tr><td>Offene Spielersalden</td><td class="r">${eur(s.offeneSalden)}</td></tr></table>
      <h3>Saldo je Spieler</h3>
      <table><tr><th>Spieler</th><th class="r">Saldo</th></tr>
      ${state.players.filter(p=>p.status==='aktiv').map(p=>`<tr><td>${p.name}</td><td class="r">${eur(playerSaldo(p.id))}</td></tr>`).join('')}</table>`;
  }
  const w=window.open('','_blank');
  if(!w){alert('Bitte Pop-ups erlauben, um den PDF-Export zu öffnen.');return;}
  const kopf = (typ==='spieler'||typ==='monat') ? '' : `<div class="head"><h1>SV Straelen · 2. Herren</h1>
      <div class="meta">${title}<br>Zeitraum: ${von} – ${bis}</div></div>`;
  w.document.write(`<html><head><meta charset="utf-8"><title>${title}</title><style>
    ${typ==='monat'?'@page{size:A4 landscape;margin:12mm;}':''}

      transform:rotate(180deg);display:flex;align-items:center;justify-content:center;padding:8px 4px;}
    .matop{height:10px;background:#1fa64a;}
    table.ma{width:100%;border-collapse:collapse;}
    table.ma th{background:#34404d;color:#fff;font-size:10.5px;font-weight:700;padding:8px 6px;text-align:right;vertical-align:bottom;line-height:1.2;}

    table.ma td{padding:6px 8px;font-size:11.5px;text-align:right;border:0;white-space:nowrap;}
    table.ma td.name{text-align:left;}
    table.ma tr.b{background:#dce9f5;} table.ma tr.g{background:#dceadb;}
    table.ma td.off{padding-left:12px;}
    .owe{color:#c0392b;}
    .paybox{margin-top:18px;background:#ededed;padding:16px 20px;}
    .paybox .pb{border:0;width:100%;margin-top:10px;}
    .paybox .pb td{border:0;padding:4px 8px;font-size:13px;}
  </style></head><body>
    ${kopf}
    ${rows}
    <p style="margin-top:34px;color:#999;font-size:11px">Erstellt am ${new Date().toLocaleDateString('de-DE')} · Mannschaftskasse 2. Herren · v${VERSION}</p>
  </body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>w.print(),350);
}
async function saveSettings(){
  const g=id=>document.getElementById(id);
  if(g('set_mb')) MB=+g('set_mb').value||0;
  if(g('set_mmb')) MMB=+g('set_mmb').value||0;
  if(g('set_inh')) konto.inhaber=g('set_inh').value;
  if(g('set_iban')) konto.iban=g('set_iban').value;
  if(g('set_bank')) konto.bank=g('set_bank').value;
  if(g('set_pp')) konto.paypal=g('set_pp').value;
  try{
    await dbUpdate('config',1,{monatsbeitrag:MB,mannschaftsbeitrag:MMB,stichtag:HEUTE,
      konto_inhaber:konto.inhaber,konto_iban:konto.iban,konto_bank:konto.bank,konto_paypal:konto.paypal});
  }catch(e){}
  closeSheet();render();
}

/* =================== Login & Daten laden (Supabase) =================== */
function mapPlayer(r){
  return {id:r.id, name:r.name, login:r.login, email:r.email, status:r.status, role:r.role, art:r.art,
    angemeldet:!!r.auth_id,
    months:(r.months && Object.keys(r.months).length)?r.months:monthsAll(true)};
}
async function loadAll(){
  const [pl,ka,st,ei,tr,ba,au,th,cf,so] = await Promise.all([
    sb.from('players').select('*'),
    sb.from('katalog').select('*').order('sort'),
    sb.from('strafen').select('*'),
    sb.from('einnahmen').select('*'),
    sb.from('transfers').select('*'),
    sb.from('bareinnahmen').select('*'),
    sb.from('ausgaben').select('*'),
    sb.from('theke').select('*'),
    sb.from('config').select('*').limit(1).maybeSingle(),
    sb.from('sonstige').select('*')
  ]);
  state.players = (pl.data||[]).map(mapPlayer);
  state.katalog = (ka.data||[]).map(r=>({id:r.id,name:r.name,betrag:Number(r.betrag),hinweis:r.hinweis}));
  state.strafen = (st.data||[]).map(r=>({id:r.id,playerId:r.player_id,typ:r.typ,grund:r.grund,betrag:Number(r.betrag),datum:r.datum,anmerkung:r.anmerkung||undefined,refAusgabe:r.ref_ausgabe||undefined,refTheke:r.ref_theke||undefined,createdAt:r.created_at,erfasstVon:r.erfasst_von}));
  state.einnahmen = (ei.data||[]).map(r=>({id:r.id,playerId:r.player_id,monat:r.monat,bank:Number(r.bank),paypal:Number(r.paypal)}));
  state.transfers = (tr.data||[]).map(r=>({id:r.id,monat:r.monat,betrag:Number(r.betrag)}));
  state.bareinnahmen = (ba.data||[]).map(r=>({id:r.id,playerId:r.player_id||null,datum:r.datum,text:r.text,betrag:Number(r.betrag)}));
  state.ausgaben = (au.data||[]).map(r=>({id:r.id,kategorie:r.kategorie,betrag:Number(r.betrag),datum:r.datum,quelle:r.quelle,art:r.art||undefined,bezahltVon:r.bezahlt_von||undefined,playerId:r.player_id||undefined}));
  state.theke = (th.data||[]).map(r=>({id:r.id,datum:r.datum,typ:r.typ,artikel:r.artikel,wer:r.wer,betrag:Number(r.betrag)}));
  state.sonstige = (so&&so.data?so.data:[]).map(r=>({id:r.id,datum:r.datum,text:r.text,betrag:Number(r.betrag),quelle:r.quelle}));
  if(cf.data){ MB=Number(cf.data.monatsbeitrag); MMB=Number(cf.data.mannschaftsbeitrag);
    konto={inhaber:cf.data.konto_inhaber||'',iban:cf.data.konto_iban||'',bank:cf.data.konto_bank||'',paypal:cf.data.konto_paypal||''}; }
  einnahmeMonat = clampSaison(HEUTE);
}
function showLogin(){
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}
async function afterLogin(){
  const {data:{user}} = await sb.auth.getUser();
  if(!user){ showLogin(); return; }
  let {data:rows} = await sb.from('players').select('*').eq('auth_id',user.id).limit(1);
  if(!rows || !rows.length){ ({data:rows} = await sb.from('players').select('*').eq('email',user.email).limit(1)); }
  currentUser = (rows && rows[0]) ? mapPlayer(rows[0]) : {name:user.email, role:'spieler'};
  role = currentUser.role || 'spieler';
  await loadAll();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='';
  tab='uebersicht';
  render();
}
async function doLogin(){
  const err=document.getElementById('lg_err'); err.textContent='';
  const btn=document.getElementById('lg_btn');
  const login=(document.getElementById('lg_user').value||'').trim().toLowerCase();
  const pw=document.getElementById('lg_pw').value||'';
  if(!login||!pw){ err.textContent='Bitte Login und Passwort eingeben.'; return; }
  btn.disabled=true; btn.textContent='Anmelden…';
  try{
    const {data:email} = await sb.rpc('get_email',{p_login:login});
    if(!email){ err.textContent='Login unbekannt.'; return; }
    let {error:e1} = await sb.auth.signInWithPassword({email, password:pw});
    if(e1){
      const {data:initOk} = await sb.rpc('is_initial',{p_login:login, p_pw:pw});
      if(!initOk){ err.textContent='Passwort falsch.'; return; }
      const {error:e2} = await sb.auth.signUp({email, password:pw});
      if(e2){ err.textContent='Erstanmeldung fehlgeschlagen: '+e2.message; return; }
      const {error:e3} = await sb.auth.signInWithPassword({email, password:pw});
      if(e3){ err.textContent='Konto erstellt, aber Login fehlgeschlagen. In Supabase bitte „Confirm email" ausschalten.'; return; }
      await sb.rpc('claim_player',{p_pw:pw});
    }
    await afterLogin();
  }catch(ex){ err.textContent='Fehler: '+(ex.message||ex); }
  finally{ btn.disabled=false; btn.textContent='Anmelden'; }
}
async function logout(){ await sb.auth.signOut(); location.reload(); }
function openPasswort(){
  showSheet(`<h3>Passwort ändern</h3>
    <div class="field"><label>Aktuelles Passwort</label><input id="pw_alt" type="password"></div>
    <div class="field"><label>Neues Passwort</label><input id="pw_neu" type="password"></div>
    <div class="field"><label>Neues Passwort wiederholen</label><input id="pw_neu2" type="password"></div>
    <button class="btn" onclick="savePasswort()">Speichern</button>
    <button class="btn sec" onclick="closeSheet()">Abbrechen</button>`);
}
async function savePasswort(){
  const alt=val('pw_alt'), neu=val('pw_neu'), neu2=val('pw_neu2');
  if(!neu||neu.length<6){ alert('Neues Passwort: mindestens 6 Zeichen.'); return; }
  if(neu!==neu2){ alert('Die neuen Passwörter stimmen nicht überein.'); return; }
  const {error:e1}=await sb.auth.signInWithPassword({email:currentUser.email, password:alt});
  if(e1){ alert('Aktuelles Passwort ist falsch.'); return; }
  const {error:e2}=await sb.auth.updateUser({password:neu});
  if(e2){ alert('Fehler: '+e2.message); return; }
  closeSheet(); alert('Passwort geändert.');
}
async function boot(){
  try{ const {data:{session}} = await sb.auth.getSession(); if(session){ await afterLogin(); return; } }catch(e){}
  showLogin();
}
boot();
